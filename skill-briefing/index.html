<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill 每日简报生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 3px; }
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 11px; color: #6366f1; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .opt { padding: 10px 14px; border-radius: 8px; font-size: 13px; border: 1px solid #374151; background: #0f1117; color: #94a3b8; cursor: pointer; transition: all 0.15s; }
  .opt:hover { border-color: #6366f1; color: #c7d2fe; }
  .opt.on { border-color: #6366f1; background: #1e1b4b; color: #c7d2fe; }
  input { width: 100%; background: #0f1117; border: 1px solid #374151; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; outline: none; margin-bottom: 14px; }
  input:focus { border-color: #6366f1; }
  input::placeholder { color: #4b5563; }
  .btn { width: 100%; padding: 12px; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .steps { display: none; }
  .step { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; color: #6b7280; }
  .step.active { color: #e2e8f0; }
  .step.done { color: #4ade80; }
  .result { display: none; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; overflow: hidden; }
  .result-bar { background: #161b22; padding: 10px 16px; border-bottom: 1px solid #30363d; font-size: 12px; color: #6b7280; display: flex; justify-content: space-between; }
  .result-body { padding: 20px; font-size: 13px; line-height: 1.9; white-space: pre-wrap; color: #cbd5e1; }
  .err { background: #2d1515; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px; color: #fca5a5; font-size: 13px; margin-top: 10px; display: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; animation: p 1.5s infinite; }
  @keyframes p { 0%,100%{opacity:1}50%{opacity:.3} }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">🧠</div>
    <div>
      <h1>Skill 每日简报生成器</h1>
      <p>由 Claude AI 实时生成 · Skill 领域动态</p>
    </div>
  </div>

  <div class="card">
    <div class="label">⚙️ 配置参数</div>
    <div class="options">
      <button class="opt on" onclick="pick(this,'标准')">📊 标准深度</button>
      <button class="opt" onclick="pick(this,'深度')">🔭 深度模式</button>
      <button class="opt" onclick="pick(this,'精简')">⚡ 精简模式</button>
    </div>
    <input id="topic" placeholder="指定子领域（可选）：如 MCP协议、提示工程…" />
    <button class="btn" id="btn" onclick="go()">✨ 生成今日简报</button>
    <div class="err" id="err"></div>
  </div>

  <div class="card steps" id="steps">
    <div class="label">🔄 生成中</div>
    <div id="stepList"></div>
  </div>

  <div class="result" id="result">
    <div class="result-bar">
      <span><span class="dot"></span>简报已生成</span>
      <span>Claude claude-sonnet-4-20250514 · 实时生成</span>
    </div>
    <div class="result-body" id="body"></div>
  </div>

</div>
<script>
let depth = '标准';

function pick(el, v) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  depth = v;
}

const STEPS = [
  '连接 Claude API…',
  '分析 Skill 领域最新动态…',
  '整理提示工程与AI智能体信息…',
  '按简报模板撰写内容…',
  '完成生成…'
];

async function go() {
  const btn = document.getElementById('btn');
  const stepsCard = document.getElementById('steps');
  const stepList = document.getElementById('stepList');
  const result = document.getElementById('result');
  const err = document.getElementById('err');
  const topic = document.getElementById('topic').value.trim();

  btn.disabled = true;
  btn.textContent = '生成中…';
  stepsCard.style.display = 'block';
  result.style.display = 'none';
  err.style.display = 'none';
  stepList.innerHTML = '';

  for (let i = 0; i < STEPS.length; i++) {
    await new Promise(r => setTimeout(r, i === 0 ? 50 : 550));
    const d = document.createElement('div');
    d.className = 'step active';
    d.innerHTML = `<span>⏳</span> ${STEPS[i]}`;
    stepList.appendChild(d);
    if (i > 0) {
      const prev = stepList.children[i - 1];
      prev.className = 'step done';
      prev.querySelector('span').textContent = '✅';
    }
  }

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ depth, topic })
    });
    const data = await res.json();

    const last = stepList.lastChild;
    last.className = 'step done';
    last.querySelector('span').textContent = '✅';
    stepsCard.style.display = 'none';

    if (data.error) {
      err.textContent = '错误：' + data.error;
      err.style.display = 'block';
    } else {
      document.getElementById('body').textContent = data.result;
      result.style.display = 'block';
    }
  } catch (e) {
    stepsCard.style.display = 'none';
    err.textContent = '网络错误：' + e.message;
    err.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = '✨ 重新生成';
}
</script>
</body>
</html>
